<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overleaf-Ready Vim Editor (Ace)</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/keybinding-vim.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/mode/latex.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/theme/monokai.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/theme/solarized_light.js"></script>

    <style>
        /* --- Dark Mode (Default) Styles --- */
        body {
            font-family: system-ui, sans-serif;
            margin: 0; padding: 0;
            background-color: #000000; color: #e8e6e3;
            height: 100vh;
            overflow: hidden;
        }
        .layout {
            display: flex;
            height: 100vh;
            position: relative;
            background-color: #000000;
        }
        #editor {
            height: 100%;
            width: 50%;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 16px;
            border-radius: 0;
            border: none;
            background-color: #000000 !important;
        }
        
        /* Hidden Hitbox Resizer */
        .resizer {
            width: 10px;
            margin: 0 -5px;
            cursor: col-resize;
            background-color: transparent; 
            position: relative;
            z-index: 50;
        }

        .preview-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            width: 50%;
            height: 100%;
            position: relative;
        }

        #preview {
            flex-grow: 1;
            padding: 15px; box-sizing: border-box;
            background-color: #000000;
            border: none;
            border-radius: 0;
            overflow-y: auto; white-space: pre-wrap;
            color: #e8e6e3;
        }

        /* 10px invisible sensor strip along the bottom border of the preview area */
        .hover-sensor {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: transparent;
            z-index: 9;
        }

        /* Tiny Status Bar - Taskbar autohide configuration */
        .status-bar {
            font-size: 6px; font-family: monospace;
            background-color: #222222;
            color: #888888;
            padding: 1px 4px;
            display: none; /* hidden completely by default */
            justify-content: space-between; align-items: center;
            border: none;
            height: 14px;
            box-sizing: border-box;
            z-index: 10;
            cursor: pointer; /* clickable to toggle sticky layout */
            user-select: none;
        }

        /* Reveal bar instantly without transitions when hovering over sensor zone OR bar itself */
        .preview-container:has(.hover-sensor:hover) .status-bar,
        .status-bar:hover {
            display: flex;
        }

        /* Force show the bar permanently when pinned */
        .status-bar.pinned {
            display: flex !important;
        }

        .left-status-group {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: default;
        }

        /* Micro connection indicator dot */
        #status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #a6e22e;
            transition: background-color 0.3s ease;
        }

        /* Dropdown styling - arrow completely removed */
        #file-picker {
            background: transparent;
            color: #a6e22e;
            border: none;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            padding: 0;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }
        #file-picker option {
            background-color: #222222;
            color: #e8e6e3;
        }

        .katex-inline { display: inline-block; padding: 0 4px; }
        
        #theme-toggle {
            background-color: transparent; color: #888888;
            border: none; padding: 0 5px;
            cursor: pointer;
            font-family: system-ui, sans-serif; font-size: 11px;
        }
        #theme-toggle:hover {
            color: #ffffff;
        }
        .ace_cursor {
            animation: none !important;
        }

        /* --- Warm, High-Readability Light Mode Override Styles --- */
        body.light-mode {
            background-color: #fdf6e3; color: #000000;
        }
        body.light-mode #editor {
            background-color: #fdf6e3 !important;
        }
        body.light-mode .status-bar {
            background-color: #e6dfcb;
            color: #657b83;
        }
        body.light-mode #file-picker {
            color: #2e6930;
        }
        body.light-mode #file-picker option {
            background-color: #fdf6e3;
            color: #000000;
        }
        body.light-mode .ace_editor .ace_line {
            color: #000000 !important;
            font-weight: 500 !important;
        }
        body.light-mode #preview {
            background-color: #fdf6e3; color: #000000;
        }
        body.light-mode #theme-toggle {
            color: #657b83;
        }
        body.light-mode #theme-toggle:hover {
            color: #000000;
        }
    </style>
</head>
<body>
    
    <div class="layout" id="layout-container">
        <div id="editor"></div>
        <div class="resizer" id="drag-bar"></div>
        
        <div class="preview-container">
            <div id="preview"></div>
            <div class="hover-sensor"></div>
            <div class="status-bar" id="statusbar-taskbar">
                <div class="left-status-group" onclick="event.stopPropagation()">
                    <div id="status-dot"></div>
                    <select id="file-picker">
                        <option value="document.tex">document.tex</option>
                    </select>
                </div>
                <button id="theme-toggle" onclick="event.stopPropagation()">🌙 Dark Mode</button>
            </div>
        </div>
    </div>

    <script>
document.addEventListener("DOMContentLoaded", () => {
    const preview = document.getElementById('preview');
    const filePicker = document.getElementById('file-picker');
    const statusDot = document.getElementById('status-dot');
    const themeToggle = document.getElementById('theme-toggle');
    const editorEl = document.getElementById('editor');
    const previewContainer = document.querySelector('.preview-container');
    const dragBar = document.getElementById('drag-bar');
    const container = document.getElementById('layout-container');
    const statusBar = document.getElementById('statusbar-taskbar');
    let saveTimeout;

    // Initialize Ace Editor Instance
    const editor = ace.edit("editor");
    editor.setTheme("ace/theme/monokai");
    editor.session.setMode("ace/mode/latex");
    editor.setOption("keyboardHandler", "ace/keyboard/vim");
    editor.setOption("cursorStyle", "block"); 
    editor.setOption("showPrintMargin", false);
    editor.session.setUseWrapMode(true); 
    editor.setOption("showGutter", false);
    editor.setOption("highlightActiveLine", false); // Disabled grey active line block background

    // Windows Taskbar Sticky Lock Toggle Mechanism
    statusBar.addEventListener('click', () => {
        statusBar.classList.toggle('pinned');
    });

    // Dynamic Resizer / Sliding Logic
    let isDragging = false;

    dragBar.addEventListener('mousedown', (e) => {
        isDragging = true;
        document.body.style.cursor = 'col-resize';
        e.preventDefault(); 
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        
        const containerRect = container.getBoundingClientRect();
        const pointerX = e.clientX - containerRect.left;
        
        let percentage = (pointerX / containerRect.width) * 100;
        if (percentage < 10) percentage = 10;
        if (percentage > 90) percentage = 90;
        
        editorEl.style.width = `${percentage}%`;
        previewContainer.style.width = `${100 - percentage}%`;
        
        editor.resize();
    });

    document.addEventListener('mouseup', () => {
        if (isDragging) {
            isDragging = false;
            document.body.style.cursor = 'default';
            editor.resize();
        }
    });

    window.addEventListener('resize', () => {
        editor.resize();
    });

    // Theme Toggle Color Adjustments
    themeToggle.addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light-mode');
        if (isLight) {
            editor.setTheme("ace/theme/solarized_light");
            themeToggle.innerText = "☀️ Light Mode";
            if(statusDot.style.backgroundColor !== 'rgb(255, 68, 68)') {
                statusDot.style.backgroundColor = '#2e6930';
            }
        } else {
            editor.setTheme("ace/theme/monokai");
            themeToggle.innerText = "🌙 Dark Mode";
            if(statusDot.style.backgroundColor !== 'rgb(255, 68, 68)') {
                statusDot.style.backgroundColor = '#a6e22e';
            }
        }
    });

    // Math rendering parser
    function processAndRender() {
        let text = editor.getValue();
        text = text.replace(/%.*(?:\r?\n|$)/g, '');

        // Process block math $$...$$
        text = text.replace(/\ $\$([\s\S]*?)\$\$\s*/g, (match, mathContent) => {
            try {
                return katex.renderToString(mathContent.trim(), { displayMode: true, throwOnError: false });
            } catch (err) { return `<span style="color:red">${err.message}</span>`; }
        });

        // Process inline math $...$
        text = text.replace(/(?<!\$)\$([\s\S]*?)\$(?!\$)/g, (match, mathContent) => {
            try {
                return `<span class="katex-inline">${katex.renderToString(mathContent.trim(), { displayMode: false, throwOnError: false })}</span>`;
            } catch (err) { return `<span style="color:red">${err.message}</span>`; }
        });

        preview.innerHTML = text;
    }

    // Completely silent auto-save logic 
    function autoSaveBackend() {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            fetch('/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    file: filePicker.value, 
                    text: editor.getValue() 
                })
            })
            .then(res => {
                if(res.ok) {
                    statusDot.style.backgroundColor = document.body.classList.contains('light-mode') ? '#2e6930' : '#a6e22e';
                } else {
                    statusDot.style.backgroundColor = '#ff4444';
                }
            })
            .catch(() => {
                statusDot.style.backgroundColor = '#ff4444'; 
            }); 
        }, 2000); 
    }

    // Pull selected file text from backend
    function loadFile(filename) {
        fetch(`/load?file=${encodeURIComponent(filename)}`)
            .then(res => {
                if (!res.ok) throw new Error("File not found");
                return res.json();
            })
            .then(data => {
                statusDot.style.backgroundColor = document.body.classList.contains('light-mode') ? '#2e6930' : '#a6e22e';
                editor.setValue(data.text || "", -1); 
                processAndRender();
                editor.focus();
            })
            .catch(() => {
                statusDot.style.backgroundColor = '#ff4444';
                editor.setValue("", -1); 
                processAndRender();
            });
    }

    // Fetch workspace files from backend and rebuild the dropdown menu
    function discoverFiles() {
        // Yes, this step requires an endpoint on your server script (like python/node) that handles GET '/files'
        // and returns a JSON string array of filenames: e.g., ["document.tex", "chapter1.tex"]
        fetch('/files')
            .then(res => res.json())
            .then(files => {
                if(Array.isArray(files) && files.length > 0) {
                    filePicker.innerHTML = ''; 
                    files.forEach(file => {
                        const opt = document.createElement('option');
                        opt.value = file;
                        opt.textContent = file.split('/').pop(); 
                        filePicker.appendChild(opt);
                    });
                    loadFile(filePicker.value);
                } else {
                    loadFile(filePicker.value);
                }
            })
            .catch(() => {
                // If your backend doesn't have a '/files' route, it safely breaks out and stays on default choice
                loadFile(filePicker.value);
            });
    }

    // Switch files when changing the dropdown option
    filePicker.addEventListener('change', () => {
        loadFile(filePicker.value);
    });

    // Listen to editor data variations
    editor.on('change', () => {
        processAndRender();
        autoSaveBackend();
    });

    // Initial sequence discovery check
    discoverFiles();
});
    </script>
</body>
</html>
